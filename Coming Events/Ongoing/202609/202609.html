<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>September 2026 Event - Octopus</title>
    <link rel="stylesheet" href="../../../styles.css">
    <style>
        .navigation-section {
            width: min(1200px, calc(100% - 4rem));
            bottom: 3rem;
        }

        .navigation-links {
            display: flex;
            flex-direction: row;
            flex-wrap: nowrap;
            justify-content: center;
            align-items: center;
            gap: clamp(1rem, 2.5vw, 2.4rem);
        }

        .navigation-link {
            background: transparent;
            border: none;
            padding: 0;
            text-transform: uppercase;
            color: white;
            text-decoration: none;
            font-size: clamp(1rem, 1.7vw, 1.35rem);
            font-weight: 300;
            letter-spacing: 2px;
            line-height: 1.4;
            text-shadow: 2px 2px 20px rgba(0, 0, 0, 0.5);
            transition: text-shadow 0.3s ease;
        }

        .navigation-link:hover {
            text-shadow: 3px 3px 25px rgba(255, 255, 255, 0.8);
        }

        .message {
            color: white;
            text-align: center;
            font-size: clamp(1rem, 1.8vw, 1.2rem);
            font-weight: 300;
            letter-spacing: 1px;
            text-shadow: 2px 2px 20px rgba(0, 0, 0, 0.5);
            margin-top: 1rem;
            max-width: 900px;
        }

        @media (max-width: 768px) {
            .navigation-links {
                flex-direction: column;
                gap: 0.9rem;
            }
        }
    </style>
</head>

<body style="background-image: url('./202609.jpg');">
    <div class="overlay"></div>
    <div class="container">

            <h1 class="title">September 2026</h1>

        </div>
